<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web CFD Mini Labs</title>
<style>

/* ══════════════════════════════════════════════════════
   DESIGN TOKENS — matches vector_studio_v5_2.html
   ══════════════════════════════════════════════════════ */
:root {
  --bg:             #e6eaf1;
  --card:           #ffffff;
  --toolbar-bg:     #191927;
  --toolbar-border: rgba(255,255,255,0.05);
  --accent-a:       #4f8ef7;
  --accent-b:       #9d7cf4;
  --accent-a-hover: #3d7de0;
  --border:         #e0e5ed;
  --shadow-card:    0 8px 40px rgba(0,0,0,0.11), 0 1px 4px rgba(0,0,0,0.07);
  --shadow-canvas:  0 3px 20px rgba(0,0,0,0.14), 0 0 0 1px rgba(0,0,0,0.07);
}

/* ══════════════════════════════════════════════════════
   RESET & BASE
   ══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

/* ══════════════════════════════════════════════════════
   APP CARD
   ══════════════════════════════════════════════════════ */
.app-card {
  background: var(--card);
  border-radius: 18px;
  box-shadow: var(--shadow-card);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  width: fit-content;
  min-width: 480px;
}

.accent-bar {
  height: 3px;
  background: linear-gradient(90deg, var(--accent-a), var(--accent-b));
  flex-shrink: 0;
}

/* ══════════════════════════════════════════════════════
   TOOLBAR
   ══════════════════════════════════════════════════════ */
.toolbar {
  background: var(--toolbar-bg);
  display: flex;
  align-items: center;
  padding: 9px 15px;
  gap: 9px;
  border-bottom: 1px solid var(--toolbar-border);
  flex-shrink: 0;
  white-space: nowrap;
}

.brand {
  display: flex;
  align-items: center;
  gap: 7px;
  color: #bfc8dc;
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.3px;
  flex-shrink: 0;
}
.brand-gem {
  width: 20px; height: 20px;
  border-radius: 5px;
  background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.toolbar-sep { width: 1px; height: 24px; background: rgba(255,255,255,0.09); flex-shrink: 0; }

.tool-group { display: flex; align-items: center; gap: 2px; }

.upload-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 9px;
  border-radius: 6px;
  border: 1px solid transparent;
  background: transparent;
  color: rgba(191,200,220,0.60);
  font-size: 11.5px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  user-select: none;
  flex-shrink: 0;
  line-height: 1;
}
.upload-btn:hover { background: rgba(255,255,255,0.07); color: #bfc8dc; }
.upload-btn svg   { flex-shrink: 0; pointer-events: none; }

/* #svgUpload keeps its native disabled state during simulation; this
   sibling selector mirrors that state onto its styled label, since the
   input itself is visually hidden in favor of the label-as-button. */
#svgUpload:disabled + .upload-btn { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

/* ══════════════════════════════════════════════════════
   CANVAS AREA
   ══════════════════════════════════════════════════════ */
.canvas-area {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 28px 40px;
  background: #edf0f6;
  flex-shrink: 0;
}

#simCanvas {
  display: block;
  width:  400px;
  height: 400px;
  border-radius: 3px;
  box-shadow: var(--shadow-canvas);
  cursor: crosshair;
  user-select: none;
  -webkit-user-select: none;
  image-rendering: pixelated;
  background: #ffffff;
}

/* ══════════════════════════════════════════════════════
   CONTROLS BAR
   ══════════════════════════════════════════════════════ */
.controls-bar {
  display: flex;
  align-items: center;
  padding: 10px 15px;
  border-top: 1px solid var(--border);
  background: #fafbfc;
  gap: 7px;
  flex-shrink: 0;
}
.ctrl-group  { display: flex; align-items: center; gap: 6px; }
.ctrl-spacer { flex: 1; }

.ctrl-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, opacity 0.12s;
  white-space: nowrap;
  user-select: none;
  line-height: 1;
  border: 1.5px solid var(--accent-a);
  background: var(--accent-a);
  color: #fff;
}
.ctrl-btn:hover:not(:disabled)  { background: var(--accent-a-hover); border-color: var(--accent-a-hover); }
.ctrl-btn:active:not(:disabled) { opacity: 0.78; transform: translateY(1px); }
.ctrl-btn:disabled              { opacity: 0.28; cursor: not-allowed; }
.ctrl-btn svg                   { flex-shrink: 0; pointer-events: none; }

/* ══════════════════════════════════════════════════════
   HINT STRIP
   ══════════════════════════════════════════════════════ */
.hint-strip {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 4px 14px;
  padding: 7px 16px 8px;
  border-top: 1px solid var(--border);
  background: #f8f9fb;
  flex-shrink: 0;
}
.hint-item { display: flex; align-items: center; gap: 5px; font-size: 10.5px; color: #9aa3b0; }
.swatch {
  display: inline-block;
  width: 9px; height: 9px;
  border-radius: 2px;
  flex-shrink: 0;
}

</style>
</head>
<body>

<div class="app-card">
  <div class="accent-bar"></div>

  <header class="toolbar">

    <div class="brand">
      <span class="brand-gem">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <polygon points="6,1 11,5 6,11 1,5" fill="rgba(255,255,255,0.92)"/>
        </svg>
      </span>
      Web CFD Mini Labs
    </div>

    <div class="toolbar-sep"></div>

    <div class="tool-group">
      <input type="file" id="svgUpload" accept=".svg" hidden>
      <label class="upload-btn" for="svgUpload" title="Cargar la geometría SVG exportada desde Vector Studio">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17,8 12,3 7,8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Cargar SVG
      </label>
    </div>

  </header>

  <main class="canvas-area">
    <canvas id="simCanvas" width="200" height="200"></canvas>
  </main>

  <footer class="controls-bar">
    <div class="ctrl-spacer"></div>
    <div class="ctrl-group">
      <button class="ctrl-btn" id="btnStart" disabled title="Ejecutar el solver LBM sobre la geometría cargada">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="6,4 20,12 6,20" fill="currentColor" stroke="none"/>
        </svg>
        Start Simulation
      </button>
    </div>
  </footer>

  <div class="hint-strip">
    <span class="hint-item">Left-click + drag: paint inlet</span>
    <span class="hint-item"><span class="swatch" style="background:#dc2828;"></span>Inlet</span>
    <span class="hint-item">Right-click + drag: paint outlet</span>
    <span class="hint-item"><span class="swatch" style="background:#285adc;"></span>Outlet</span>
    <span class="hint-item"><span class="swatch" style="background:#000000;"></span>Wall</span>
  </div>

</div>
  <script>
/* ══════════════════════════════════════════════════════════════════════
   Shared grid constants (formerly duplicated across geometry.js,
   solver.js, renderer.js, and main.js — identical values in every file,
   declared once here since they now share a single script scope).
   ══════════════════════════════════════════════════════════════════════ */
const GRID_SIZE = 200;
const FLUID = 0, WALL = 1, INLET = 2, OUTLET = 3;

/* ══════════════════════════════════════════════════════════════════════
   geometry.js
   ══════════════════════════════════════════════════════════════════════ */

function parseSVGToGrid(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = () => {
      const blob = new Blob([reader.result], { type: 'image/svg+xml' });
      const url  = URL.createObjectURL(blob);
      const img  = new Image();

      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width  = GRID_SIZE;
        canvas.height = GRID_SIZE;
        const ctx = canvas.getContext('2d');

        /* White fill first: transparent SVG regions must rasterize as
           fluid, not as black, once composited onto the grid. */
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, GRID_SIZE, GRID_SIZE);
        ctx.drawImage(img, 0, 0, GRID_SIZE, GRID_SIZE);

        const { data } = ctx.getImageData(0, 0, GRID_SIZE, GRID_SIZE);
        const grid = new Uint8Array(GRID_SIZE * GRID_SIZE);

        for (let i = 0; i < grid.length; i++) {
          const r = data[i * 4];
          const g = data[i * 4 + 1];
          const b = data[i * 4 + 2];
          const brightness = (r + g + b) / 3;
          grid[i] = brightness < 128 ? 1 : 0;
        }

        URL.revokeObjectURL(url);
        resolve(grid);
      };

      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error('No se pudo cargar el SVG como imagen.'));
      };

      img.src = url;
    };

    reader.onerror = () => reject(new Error('No se pudo leer el archivo SVG.'));
    reader.readAsText(file);
  });
}

/* ══════════════════════════════════════════════════════════════════════
   solver.js
   ══════════════════════════════════════════════════════════════════════ */

const N = GRID_SIZE * GRID_SIZE;
const Q = 9;

/* D2Q9 lattice: 0=rest, 1=E, 2=N, 3=W, 4=S, 5=NE, 6=NW, 7=SW, 8=SE */
const CX  = [0, 1, 0, -1, 0, 1, -1, -1, 1];
const CY  = [0, 0, 1, 0, -1, 1, 1, -1, -1];
const W   = [4 / 9, 1 / 9, 1 / 9, 1 / 9, 1 / 9, 1 / 36, 1 / 36, 1 / 36, 1 / 36];
const OPP = [0, 3, 4, 1, 2, 7, 8, 5, 6];

const TAU           = 1.0;   /* relaxation time -> water-like viscosity */
const INLET_UX      = 0.05;
const REFERENCE_RHO = 1.0;

class LBMSolver {
  constructor(grid) {
    this.grid = grid;
    this.size = GRID_SIZE;

    this.f    = new Float32Array(N * Q);
    this.fNew = new Float32Array(N * Q);
    this.rho  = new Float32Array(N);
    this.ux   = new Float32Array(N);
    this.uy   = new Float32Array(N);

    this.rho.fill(1.0);
    for (let idx = 0; idx < N; idx++) this._setEquilibrium(idx, 1.0, 0, 0);
  }

  _setEquilibrium(idx, rho, ux, uy) {
    const usq  = ux * ux + uy * uy;
    const base = idx * Q;
    for (let i = 0; i < Q; i++) {
      const cu = CX[i] * ux + CY[i] * uy;
      this.f[base + i] = W[i] * rho * (1 + 3 * cu + 4.5 * cu * cu - 1.5 * usq);
    }
  }

  step() {
    const { grid, f, fNew, rho, ux, uy, size } = this;

    /* Pass 1: macroscopic moments, boundary forcing, BGK collision (in place on f) */
    for (let idx = 0; idx < N; idx++) {
      if (grid[idx] === WALL) continue;

      const base = idx * Q;
      let r = 0, u = 0, v = 0;
      for (let i = 0; i < Q; i++) {
        const fi = f[base + i];
        r += fi;
        u += fi * CX[i];
        v += fi * CY[i];
      }
      u /= r;
      v /= r;

      if (grid[idx] === INLET) {
        /* Equilibrium boundary: fix both rho and u, ignoring the streamed-in
           sum. The populations entering from outside the domain are never
           replenished by streaming alone, so forcing velocity but deriving
           rho from that incomplete sum drains mass from the inlet column
           every step. */
        r = REFERENCE_RHO;
        u = INLET_UX;
        v = 0.0;
      } else if (grid[idx] === OUTLET) {
        r = REFERENCE_RHO;
      }

      rho[idx] = r;
      ux[idx]  = u;
      uy[idx]  = v;

      const usq = u * u + v * v;
      for (let i = 0; i < Q; i++) {
        const cu  = CX[i] * u + CY[i] * v;
        const feq = W[i] * r * (1 + 3 * cu + 4.5 * cu * cu - 1.5 * usq);
        f[base + i] += (feq - f[base + i]) / TAU;
      }
    }

    /* Pass 2: streaming, with bounce-back off walls and domain edges */
    fNew.fill(0);
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        const idx = y * size + x;
        if (grid[idx] === WALL) continue;

        const base = idx * Q;
        for (let i = 0; i < Q; i++) {
          const fi = f[base + i];
          const nx = x + CX[i];
          const ny = y + CY[i];

          if (nx < 0 || nx >= size || ny < 0 || ny >= size || grid[ny * size + nx] === WALL) {
            fNew[base + OPP[i]] += fi;
          } else {
            fNew[(ny * size + nx) * Q + i] += fi;
          }
        }
      }
    }

    [this.f, this.fNew] = [this.fNew, this.f];
  }

  get velocity() {
    return { ux: this.ux, uy: this.uy };
  }
}

/* ══════════════════════════════════════════════════════════════════════
   renderer.js
   ══════════════════════════════════════════════════════════════════════ */

const PARTICLE_COUNT   = 500;
const ADVECTION_SCALE  = 15;   /* matches the 10-15 solver substeps per frame */
const V_MAX            = 0.1;  /* lattice speed that maps to the top of the ramp */

/* Viridis: perceptually-uniform, colorblind-safe sequential colormap —
   the standard accessible replacement for a classic blue-to-red "jet"
   scale in scientific visualization. Dark purple = slow, yellow = fast. */
const VIRIDIS_STOPS = [
  [68, 1, 84],
  [59, 82, 139],
  [33, 145, 140],
  [94, 201, 98],
  [253, 231, 37],
];

function viridis(t) {
  const clamped = t < 0 ? 0 : t > 1 ? 1 : t;
  const scaled  = clamped * (VIRIDIS_STOPS.length - 1);
  const i       = Math.min(VIRIDIS_STOPS.length - 2, Math.floor(scaled));
  const frac    = scaled - i;
  const [r1, g1, b1] = VIRIDIS_STOPS[i];
  const [r2, g2, b2] = VIRIDIS_STOPS[i + 1];
  return [
    r1 + (r2 - r1) * frac,
    g1 + (g2 - g1) * frac,
    b1 + (b2 - b1) * frac,
  ];
}

class Renderer {
  constructor(canvas, grid) {
    this.canvas = canvas;
    this.ctx    = canvas.getContext('2d');
    this.grid   = grid;
    this.size   = GRID_SIZE;

    this.heatmapImage = this.ctx.createImageData(GRID_SIZE, GRID_SIZE);

    this.inletCells = [];
    for (let idx = 0; idx < grid.length; idx++) {
      if (grid[idx] === INLET) this.inletCells.push(idx);
    }

    this.particles = Array.from({ length: PARTICLE_COUNT }, () => this._spawnParticle());
  }

  _randomInletPosition() {
    if (this.inletCells.length === 0) {
      return { x: Math.random() * this.size, y: Math.random() * this.size };
    }
    const idx = this.inletCells[(Math.random() * this.inletCells.length) | 0];
    return { x: idx % this.size, y: Math.floor(idx / this.size) };
  }

  _spawnParticle() {
    const { x, y } = this._randomInletPosition();
    return { x, y, px: x, py: y };
  }

  drawHeatmap(ux, uy) {
    const { grid, heatmapImage } = this;
    const data = heatmapImage.data;

    for (let idx = 0; idx < grid.length; idx++) {
      const o = idx * 4;
      if (grid[idx] === WALL) {
        data[o] = 0; data[o + 1] = 0; data[o + 2] = 0; data[o + 3] = 255;
        continue;
      }

      const speed = Math.sqrt(ux[idx] * ux[idx] + uy[idx] * uy[idx]);
      const [r, g, b] = viridis(speed / V_MAX);
      data[o] = r; data[o + 1] = g; data[o + 2] = b; data[o + 3] = 255;
    }

    this.ctx.putImageData(heatmapImage, 0, 0);
  }

  drawStreamlines(ux, uy) {
    const { ctx, grid, size, particles } = this;

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.55)';
    ctx.lineWidth   = 1;
    ctx.beginPath();

    for (const p of particles) {
      const idx = (p.y | 0) * size + (p.x | 0);

      ctx.moveTo(p.px, p.py);
      ctx.lineTo(p.x, p.y);

      p.px = p.x;
      p.py = p.y;
      p.x += ux[idx] * ADVECTION_SCALE;
      p.y += uy[idx] * ADVECTION_SCALE;

      const nx = p.x | 0;
      const ny = p.y | 0;
      const outOfBounds = nx < 0 || nx >= size || ny < 0 || ny >= size;
      const cell = outOfBounds ? WALL : grid[ny * size + nx];

      if (outOfBounds || cell === WALL || cell === OUTLET) {
        const spawn = this._randomInletPosition();
        p.x = p.px = spawn.x;
        p.y = p.py = spawn.y;
      }
    }

    ctx.stroke();
  }
}

/* ══════════════════════════════════════════════════════════════════════
   main.js
   ══════════════════════════════════════════════════════════════════════ */

const STEPS_PER_FRAME = 12;

const COLORS = {
  [FLUID]:  [255, 255, 255],
  [WALL]:   [0, 0, 0],
  [INLET]:  [220, 40, 40],
  [OUTLET]: [40, 90, 220],
};

const svgUpload = document.getElementById('svgUpload');
const simCanvas = document.getElementById('simCanvas');
const btnStart  = document.getElementById('btnStart');
const ctx       = simCanvas.getContext('2d');

let grid = null;
let painting = false;
let paintValue = null;
let simulationRunning = false;

/* Vector Studio's background template (see BG_SNAP_POINTS in
   vector_studio_v5_2.html) fixes two small indicator dots near the top
   and one near the bottom of its 141.7x141.7 canvas as permanent snap
   targets — every student's channel walls snap their endpoints to
   these exact points. That template is stripped before export, so the
   uploaded SVG carries no visual trace of the dots; their positions
   are hardcoded here to match, so the two top dots are always the
   inlets and the bottom dot is always the outlet, with no manual
   painting required to go from design to simulation. */
const CANVAS_UNITS      = 141.7;
const MARKER_SEARCH_R   = 5;   /* grid cells: how far to hunt for open fluid if a marker lands on a wall pixel */
const MARKER_FLOOD_R    = 12;  /* grid cells: how far the inlet/outlet region can spread from each marker */
const INLET_MARKERS_SVG  = [[43.8, 21.7], [101.4, 21.7]];
const OUTLET_MARKERS_SVG = [[71, 127.7]];

function svgToGrid(x, y) {
  return {
    x: Math.round(x * GRID_SIZE / CANVAS_UNITS),
    y: Math.round(y * GRID_SIZE / CANVAS_UNITS),
  };
}

function findNearestFluidCell(grid, x, y) {
  if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE && grid[y * GRID_SIZE + x] !== WALL) {
    return { x, y };
  }

  for (let r = 1; r <= MARKER_SEARCH_R; r++) {
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        if (Math.max(Math.abs(dx), Math.abs(dy)) !== r) continue;

        const nx = x + dx, ny = y + dy;
        if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) continue;
        if (grid[ny * GRID_SIZE + nx] !== WALL) return { x: nx, y: ny };
      }
    }
  }

  return null;
}

function floodFillBoundary(grid, originX, originY, value) {
  const seed = findNearestFluidCell(grid, originX, originY);
  if (!seed) return;

  const visited = new Set([seed.y * GRID_SIZE + seed.x]);
  const queue = [seed];

  while (queue.length > 0) {
    const { x, y } = queue.shift();
    grid[y * GRID_SIZE + x] = value;

    for (const [dx, dy] of [[1, 0], [-1, 0], [0, 1], [0, -1]]) {
      const nx = x + dx, ny = y + dy;
      if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) continue;
      if (Math.max(Math.abs(nx - originX), Math.abs(ny - originY)) > MARKER_FLOOD_R) continue;

      const nIdx = ny * GRID_SIZE + nx;
      if (visited.has(nIdx) || grid[nIdx] === WALL) continue;

      visited.add(nIdx);
      queue.push({ x: nx, y: ny });
    }
  }
}

function applyDesignMarkers(grid) {
  for (const [svgX, svgY] of INLET_MARKERS_SVG) {
    const { x, y } = svgToGrid(svgX, svgY);
    floodFillBoundary(grid, x, y, INLET);
  }
  for (const [svgX, svgY] of OUTLET_MARKERS_SVG) {
    const { x, y } = svgToGrid(svgX, svgY);
    floodFillBoundary(grid, x, y, OUTLET);
  }
}

function drawGrid(grid) {
  const imageData = ctx.createImageData(GRID_SIZE, GRID_SIZE);
  for (let i = 0; i < grid.length; i++) {
    const [r, g, b] = COLORS[grid[i]];
    imageData.data[i * 4]     = r;
    imageData.data[i * 4 + 1] = g;
    imageData.data[i * 4 + 2] = b;
    imageData.data[i * 4 + 3] = 255;
  }
  ctx.putImageData(imageData, 0, 0);
}

function drawCell(x, y, value) {
  const [r, g, b] = COLORS[value];
  ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
  ctx.fillRect(x, y, 1, 1);
}

function canvasToGrid(event) {
  const rect = simCanvas.getBoundingClientRect();
  return {
    x: Math.floor((event.clientX - rect.left) / rect.width  * GRID_SIZE),
    y: Math.floor((event.clientY - rect.top)  / rect.height * GRID_SIZE),
  };
}

function paintAt(event) {
  if (!grid || paintValue === null || simulationRunning) return;

  const { x, y } = canvasToGrid(event);
  if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return;

  const idx = y * GRID_SIZE + x;
  if (grid[idx] === WALL) return;

  grid[idx] = paintValue;
  drawCell(x, y, paintValue);
}

svgUpload.addEventListener('change', async (event) => {
  const file = event.target.files[0];
  if (!file) return;

  grid = await parseSVGToGrid(file);
  applyDesignMarkers(grid);
  drawGrid(grid);
  btnStart.disabled = false;
});

simCanvas.addEventListener('contextmenu', (event) => event.preventDefault());

simCanvas.addEventListener('mousedown', (event) => {
  if (simulationRunning) return;

  if (event.button === 0)      paintValue = INLET;
  else if (event.button === 2) paintValue = OUTLET;
  else return;

  painting = true;
  paintAt(event);
});

simCanvas.addEventListener('mousemove', (event) => {
  if (painting) paintAt(event);
});

window.addEventListener('mouseup', () => {
  painting = false;
  paintValue = null;
});

btnStart.addEventListener('click', () => {
  if (!grid || simulationRunning) return;

  simulationRunning = true;
  svgUpload.disabled = true;
  btnStart.disabled = true;

  const solver = new LBMSolver(grid);
  const renderer = new Renderer(simCanvas, grid);

  function frame() {
    for (let i = 0; i < STEPS_PER_FRAME; i++) solver.step();
    renderer.drawHeatmap(solver.ux, solver.uy);
    renderer.drawStreamlines(solver.ux, solver.uy);
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
});
  </script>
</body>
</html>
